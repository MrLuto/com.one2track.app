<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
        color: #13313b;
      }

      h1 {
        margin-bottom: 8px;
      }

      p {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 14px;
      }

      button {
        background: #245f73;
        color: #fff;
        border: 0;
        padding: 10px 14px;
        cursor: pointer;
      }

      #status {
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="app.pair.repair_title">Reconnect One2Track</h1>
    <p>Enter the updated One2Track credentials for this tracker.</p>

    <label for="username" data-i18n="app.pair.username_label">Username or email</label>
    <input id="username" type="text" autocomplete="username" />

    <label for="password" data-i18n="app.pair.password_label">Password</label>
    <input id="password" type="password" autocomplete="current-password" />

    <button id="submit" type="button" data-i18n="app.pair.repair_submit">Save credentials</button>
    <div id="status"></div>

    <script>
      const submit = document.getElementById("submit");
      const status = document.getElementById("status");

      submit.addEventListener("click", async () => {
        submit.disabled = true;
        status.textContent = "";

        try {
          await Homey.emit("repair_credentials", {
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          });
          status.textContent = Homey.__("app.pair.repair_success");
          Homey.done();
        } catch (error) {
          status.textContent = error?.message || Homey.__("app.pair.repair_error");
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
